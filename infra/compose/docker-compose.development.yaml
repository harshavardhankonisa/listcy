name: listcy
services:
  postgres:
    image: postgres:18-alpine
    container_name: listcy-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: listcy
      POSTGRES_PASSWORD: listcy
      POSTGRES_DB: listcydb
    volumes:
      - listcy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U listcy -d listcydb']
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: listcy-localstack
    ports:
      - '4566:4566'
    env_file:
      - ../env/.env.localstack
    volumes:
      - listcy_localstack_data:/var/lib/localstack
      - ../localstack/init:/etc/localstack/init/ready.d
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4566/_localstack/health']
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    container_name: listcy-main
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.development
    ports:
      - '3000:3000'
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ../env/.env.development
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  studio:
    container_name: listcy-studio
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.development
    ports:
      - '4983:4983'
    volumes:
      - ../../:/app
      - /app/node_modules
    env_file:
      - ../env/.env.development
    command: npx drizzle-kit studio --host 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  listcy_pgdata:
  listcy_localstack_data:
