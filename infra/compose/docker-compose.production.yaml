name: listcy
services:
  app:
    container_name: listcy-main
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.production
    ports:
      - '3000:3000'
    env_file:
      - ../env/.env.production
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
